          valueFrom:
            secretKeyRef:
              name: apbancaemp-db-secret
              key: usuario_aurora
        - name: DB_PASS_MYSQL
          valueFrom:
            secretKeyRef:
              name: apbancaemp-db-secret
              key: password_aurora
        - name: DB_HOST_MYSQL
          valueFrom:
            secretKeyRef:
              name: apbancaemp-db-secret
              key: url_aurora
